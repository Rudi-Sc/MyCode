apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-client-cm
data:
  sentinel-client.py: |
    import os
    import sys
    import time
    from datetime import datetime
    from redis.sentinel import Sentinel

    def client_redis():
        # Configuration from Environment Variables
        sentinel_host = os.getenv("SENTINEL_HOST", "redis-sentinel")
        sentinel_port = int(os.getenv("SENTINEL_PORT", 26379))
        sentinel_password = os.getenv("SENTINEL_PASSWORD", "sentinel_password")
        master_name = os.getenv("MASTER_NAME", "mymaster")
        interval = int(os.getenv("CHECK_INTERVAL", "10"))
    
    try:
        # Connect to Sentinel
        sentinel = Sentinel(
            [(sentinel_host, sentinel_port)],
            socket_timeout=2,
            sentinel_kwargs={'password': sentinel_password})
        )
        # Get master connection
        master = sentinel.master_for(
            service_name=master_name,
            socket_timeout=2,
            password=sentinel_password,
            decode_responses=True  # Return strings instead of bytes
        )

        # Get a slave connection (optional, for read operations)
        slave = sentinel.slave_for(
            service_name=master_name,
            socket_timeout=2,
            password=sentinel_password,
            decode_responses=True
        )

        # Test write to master
        master.set('foo', 'bar')
        print(f"Wrote to master: foo = 'bar'")

        # Test read from slave (or master if no slave available)
        value = slave.get('foo')
        print(f"Read from slave: foo = '{value}'")

    except (ConnectionError, MasterNotFoundError, SlaveNotFoundError) as e:
        print(f"Redis Sentinel connection error: {e}")
        sys.exit(1)
    except Exception as e:
        print(f" Unexpected error: {e}")
        sys.exit(1)   
